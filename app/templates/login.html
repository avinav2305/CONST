{% extends "base.html" %}
{% block title %}Login — CONST{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <p class="auth-eyebrow">Welcome back</p>
            <h1 class="auth-title">LOG<br><span>IN</span></h1>
        </div>

        <form class="auth-form" method="POST" action="/login">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Your password" required>
            </div>

            <button type="submit" class="btn-submit">Login →</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="/register">Register</a></p>
    </div>
</section>
{% endblock %}
