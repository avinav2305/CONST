name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 168377602714.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build and push Docker image
        run: |
          docker build -t const-app .
          docker tag const-app:latest 168377602714.dkr.ecr.ap-south-1.amazonaws.com/const-app:latest
          docker push 168377602714.dkr.ecr.ap-south-1.amazonaws.com/const-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 168377602714.dkr.ecr.ap-south-1.amazonaws.com
            docker kill $(docker ps -q) || true
            docker rm $(docker ps -aq) || true
            docker pull 168377602714.dkr.ecr.ap-south-1.amazonaws.com/const-app:latest
            docker run -d --name const-app -p 5000:5000 168377602714.dkr.ecr.ap-south-1.amazonaws.com/const-app:latest